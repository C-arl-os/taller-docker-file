services:

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dockerdb
    volumes:
      - dbdata:/var/lib/mysql

  server:
    build: ./server
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: dockerdb
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  dbdata: